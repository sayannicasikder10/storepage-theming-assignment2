version: "3.8"

services:
  caddy:
    image: caddy:2.7-alpine
    restart: unless-stopped
    ports:
      - "8080:80"     # HTTP
      - "8443:443"    # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  caddy_data:
  caddy_config:
